<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Research Agent - Private Beta</title>
<style>
  :root { color-scheme: dark; --bg:#0b0d12; --panel:#151922; --muted:#9aa4b2; --text:#f4f7fb; --accent:#6ee7b7; --warn:#fbbf24; --bad:#fb7185; --border:#2b3340; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif; background:var(--bg); color:var(--text); }
  header { padding:20px clamp(16px,4vw,36px); border-bottom:1px solid var(--border); background:#10141b; }
  h1 { margin:0 0 8px; font-size:24px; }
  .disclaimer { color:#111827; background:var(--warn); padding:10px 12px; border-radius:8px; font-weight:700; max-width:960px; }
  main { padding:24px clamp(16px,4vw,36px); display:grid; gap:20px; }
  .controls, .card { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:16px; }
  .controls { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; align-items:end; }
  label { display:grid; gap:6px; color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
  input { background:#0f131a; border:1px solid var(--border); color:var(--text); border-radius:6px; padding:10px; font:inherit; }
  button { background:#2563eb; color:white; border:0; border-radius:6px; padding:10px 12px; font:inherit; font-weight:700; cursor:pointer; }
  button.secondary { background:#283241; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .status { color:var(--muted); font-size:13px; }
  .grid { display:grid; gap:10px; }
  .row { display:grid; grid-template-columns:90px 1fr 120px 150px; gap:12px; align-items:center; padding:12px; border:1px solid var(--border); border-radius:8px; background:#10141b; cursor:pointer; }
  .row:hover { border-color:#4b5563; }
  .ticker { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-weight:800; }
  .muted { color:var(--muted); }
  .score { font-weight:800; }
  .good { color:var(--accent); } .mid { color:var(--warn); } .low { color:var(--bad); }
  pre { white-space:pre-wrap; color:#cbd5e1; font-family:ui-monospace, SFMono-Regular, Consolas, monospace; font-size:13px; line-height:1.55; }
  dialog { width:min(840px,92vw); border:1px solid var(--border); border-radius:8px; background:var(--panel); color:var(--text); padding:0; }
  dialog .modal-head { display:flex; justify-content:space-between; align-items:center; padding:14px 16px; border-bottom:1px solid var(--border); }
  dialog .modal-body { padding:16px; display:grid; gap:12px; }
  @media (max-width:720px) { .row { grid-template-columns:1fr 1fr; } }
</style>
</head>
<body>
<header>
  <h1>Stock Research Agent <span class="muted">Private Beta</span></h1>
  <div class="disclaimer">Educational research tool only. Not financial advice. Do your own research before investing.</div>
</header>
<main>
  <section class="controls">
    <label>API Base URL
      <input id="baseUrl" placeholder="Same origin by default">
    </label>
    <label>API Key for protected actions
      <input id="apiKey" type="password" placeholder="Stored only in this browser">
    </label>
    <label>Lookup ticker
      <input id="tickerInput" maxlength="10" placeholder="AAPL">
    </label>
    <div>
      <button id="connectBtn">Check Health</button>
      <button class="secondary" id="lookupBtn">Lookup</button>
      <button class="secondary" id="refreshBtn">Refresh Analysis</button>
    </div>
    <div class="status" id="status">Not connected</div>
  </section>

  <section class="card">
    <h2>Research Scores</h2>
    <p class="muted">Latest analyses from the selected API. Scores are research signals, not recommendations.</p>
    <div class="grid" id="stocks"></div>
  </section>

  <section class="card">
    <h2>Daily Report</h2>
    <button class="secondary" id="reportBtn">Load Report</button>
    <pre id="report"></pre>
  </section>
</main>

<dialog id="modal">
  <div class="modal-head">
    <strong id="modalTitle">Analysis</strong>
    <button class="secondary" id="closeBtn">Close</button>
  </div>
  <div class="modal-body" id="modalBody"></div>
</dialog>

<script>
const state = new Map();
const baseInput = document.getElementById("baseUrl");
const keyInput = document.getElementById("apiKey");
const statusEl = document.getElementById("status");
const stocksEl = document.getElementById("stocks");
const tickerInput = document.getElementById("tickerInput");
const reportEl = document.getElementById("report");
const modal = document.getElementById("modal");
const modalTitle = document.getElementById("modalTitle");
const modalBody = document.getElementById("modalBody");

baseInput.value = localStorage.getItem("stockAgentBaseUrl") || "";
keyInput.value = localStorage.getItem("stockAgentApiKey") || "";

function baseUrl() {
  const raw = baseInput.value.trim().replace(/\/$/, "");
  return raw || window.location.origin;
}

function headers(protectedAction = false) {
  const h = { "Accept": "application/json" };
  if (protectedAction && keyInput.value.trim()) h["X-API-Key"] = keyInput.value.trim();
  return h;
}

async function api(path, options = {}) {
  const res = await fetch(baseUrl() + path, options);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function text(tag, value, className) {
  const el = document.createElement(tag);
  el.textContent = value == null || value === "" ? "N/A" : String(value);
  if (className) el.className = className;
  return el;
}

function scoreClass(score) {
  if (score >= 75) return "good";
  if (score >= 55) return "mid";
  return "low";
}

function renderRows(stocks) {
  stocksEl.replaceChildren();
  if (!stocks.length) {
    stocksEl.append(text("p", "No analyses found yet.", "muted"));
    return;
  }
  stocks.forEach(stock => {
    state.set(stock.ticker, stock);
    const row = document.createElement("div");
    row.className = "row";
    row.append(
      text("div", stock.ticker, "ticker"),
      text("div", "Research Score", "muted"),
      text("div", Number(stock.final_score || 0).toFixed(1), `score ${scoreClass(stock.final_score || 0)}`),
      text("div", `Freshness: ${stock.timestamp || "unknown"}`, "muted")
    );
    row.addEventListener("click", () => openAnalysis(stock));
    stocksEl.append(row);
  });
}

function openAnalysis(stock) {
  modalTitle.textContent = `${stock.ticker} research details`;
  modalBody.replaceChildren();
  modalBody.append(
    text("div", `Research Score: ${Number(stock.final_score || 0).toFixed(1)}`),
    text("div", `Confidence: ${Number(stock.confidence || 0).toFixed(0)}%`),
    text("div", `Bullish Signals: ${stock.bull_case || "N/A"}`),
    text("div", `Bearish Signals: ${stock.bear_case || "N/A"}`),
    text("div", `Data Freshness: ${stock.timestamp || "unknown"}`, "muted"),
    text("pre", stock.analysis_text || "")
  );
  modal.showModal();
}

async function checkHealth() {
  localStorage.setItem("stockAgentBaseUrl", baseInput.value.trim());
  localStorage.setItem("stockAgentApiKey", keyInput.value.trim());
  statusEl.textContent = "Checking...";
  try {
    await api("/health");
    statusEl.textContent = "Connected";
    await loadDashboard();
  } catch (err) {
    statusEl.textContent = `Connection failed: ${err.message}`;
  }
}

async function loadDashboard() {
  stocksEl.replaceChildren(text("p", "Loading...", "muted"));
  try {
    renderRows(await api("/top-stocks?n=50"));
  } catch (err) {
    stocksEl.replaceChildren(text("p", `Could not load dashboard: ${err.message}`, "muted"));
  }
}

async function lookup() {
  const ticker = tickerInput.value.trim().toUpperCase();
  if (!ticker) return;
  try {
    const stock = await api(`/analysis/${encodeURIComponent(ticker)}`);
    state.set(stock.ticker, stock);
    openAnalysis(stock);
  } catch (err) {
    statusEl.textContent = `Lookup failed: ${err.message}`;
  }
}

async function refreshAnalysis() {
  const ticker = tickerInput.value.trim().toUpperCase();
  if (!ticker) return;
  localStorage.setItem("stockAgentApiKey", keyInput.value.trim());
  try {
    await api(`/analysis/${encodeURIComponent(ticker)}/refresh`, {
      method: "POST",
      headers: headers(true),
    });
    statusEl.textContent = `Refresh queued for ${ticker}`;
  } catch (err) {
    statusEl.textContent = `Refresh rejected: ${err.message}`;
  }
}

async function loadReport() {
  reportEl.textContent = "Loading...";
  try {
    const report = await api("/report/daily");
    reportEl.textContent = report.markdown || "No report available.";
  } catch (err) {
    reportEl.textContent = `Could not load report: ${err.message}`;
  }
}

document.getElementById("connectBtn").addEventListener("click", checkHealth);
document.getElementById("lookupBtn").addEventListener("click", lookup);
document.getElementById("refreshBtn").addEventListener("click", refreshAnalysis);
document.getElementById("reportBtn").addEventListener("click", loadReport);
document.getElementById("closeBtn").addEventListener("click", () => modal.close());
tickerInput.addEventListener("keydown", e => { if (e.key === "Enter") lookup(); });
checkHealth();
</script>
</body>
</html>
